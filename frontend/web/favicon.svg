<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f1f5f9"/>
      <stop offset="1" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Piston head -->
  <rect x="18" y="8" width="28" height="18" rx="4" fill="url(#metal)"/>
  <rect x="20" y="10" width="24" height="4" rx="2" fill="#e2e8f0"/>

  <!-- Connecting rod -->
  <rect x="29" y="24" width="6" height="18" rx="3" fill="#cbd5e1"/>

  <!-- Crank -->
  <circle cx="32" cy="50" r="10" fill="#475569"/>
  <circle cx="32" cy="50" r="5" fill="#0f172a"/>

  <!-- Accent -->
  <rect x="14" y="30" width="8" height="4" rx="2" transform="rotate(-25 18 32)" fill="#f97316"/>
  <rect x="42" y="30" width="8" height="4" rx="2" transform="rotate(25 46 32)" fill="#f97316"/>
</svg>
