server:
  port: ${PORT:8081}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION:86400000}

cors:
  allowed-origins: ${CORS_ORIGINS}

mercadopago:
  access-token: ${MERCADOPAGO_ACCESS_TOKEN}
  public-key: ${MERCADOPAGO_PUBLIC_KEY}
  back-urls:
    success: ${MERCADOPAGO_SUCCESS_URL}
    pending: ${MERCADOPAGO_PENDING_URL}
    failure: ${MERCADOPAGO_FAILURE_URL}
  notification-url: ${MERCADOPAGO_NOTIFICATION_URL}
  webhook-secret: ${MERCADOPAGO_WEBHOOK_SECRET}
