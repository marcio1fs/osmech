spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/oficina_db?sslmode=disable}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:3782}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}

  flyway:
    enabled: ${FLYWAY_ENABLED:false}

app:
  jwt:
    secret: ${JWT_SECRET:osmech-dev-secret-key-change-before-production}
    expiration-ms: ${JWT_EXPIRATION:86400000}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:8083,http://localhost:3000}

mercadopago:
  access-token: ${MERCADOPAGO_ACCESS_TOKEN:}
  public-key: ${MERCADOPAGO_PUBLIC_KEY:}
  webhook-secret: ${MERCADOPAGO_WEBHOOK_SECRET:}
