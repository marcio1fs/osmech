server:
  port: ${PORT:8081}
  servlet:
    context-path: /api

spring:
  application:
    name: osmech-backend
  cloud:
    vault:
      enabled: ${SPRING_CLOUD_VAULT_ENABLED:false}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/oficina_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 30000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${FLYWAY_BASELINE_VERSION:1}

# Configuracao JWT - Em producao, defina JWT_SECRET via variavel de ambiente!
# IMPORTANTE: A variavel JWT_SECRET e obrigatoria. Sem ela, o app nao inicia.
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION:86400000}  # 24 horas

# Actuator (health checks e metricas)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# CORS
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:8083,http://localhost:3000}

# Configuracao futura WhatsApp (Twilio / Meta)
whatsapp:
  enabled: false
  provider: twilio  # twilio | meta
  twilio:
    account-sid: ""
    auth-token: ""
    from-number: ""
  meta:
    phone-number-id: ""
    access-token: ""

# Configuracao futura IA (OpenAI)
ai:
  enabled: ${AI_ENABLED:false}
  provider: ${AI_PROVIDER:gemini}
  openai:
    api-key: ${AI_OPENAI_API_KEY:}
    model: ${AI_OPENAI_MODEL:gemini-1.5-flash}
    base-url: ${AI_OPENAI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai/chat/completions}

# Configuracao Mercado Pago (Checkout Pro)
# IMPORTANTE: webhook-secret e OBRIGATORIO em producao e staging
# Em desenvolvimento, a validacao pode ser pulada se secret nao estiver configurado
# Configure MERCADOPAGO_WEBHOOK_SECRET para ativar validacao de assinatura HMAC
mercadopago:
  access-token: ${MERCADOPAGO_ACCESS_TOKEN}
  public-key: ${MERCADOPAGO_PUBLIC_KEY}
  back-urls:
    success: ${MERCADOPAGO_SUCCESS_URL:}
    pending: ${MERCADOPAGO_PENDING_URL:}
    failure: ${MERCADOPAGO_FAILURE_URL:}
  notification-url: ${MERCADOPAGO_NOTIFICATION_URL:}
  webhook-secret: ${MERCADOPAGO_WEBHOOK_SECRET:}

logging:
  level:
    com.osmech: DEBUG
    com.osmech.mecanico: DEBUG
    com.osmech.payment.service: INFO
