server:
  port: 8081

spring:
  application:
    name: osmech-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/oficina_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 30000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${FLYWAY_BASELINE_VERSION:1}

# Configuração JWT — Em produção, defina JWT_SECRET via variável de ambiente!
# IMPORTANTE: A variável JWT_SECRET é obrigatória. Sem ela, o app não inicia.
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION:86400000}  # 24 horas

# Actuator (health checks e métricas)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# CORS
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:8083,http://localhost:3000}

# Configuração futura WhatsApp (Twilio / Meta)
whatsapp:
  enabled: false
  provider: twilio  # twilio | meta
  twilio:
    account-sid: ""
    auth-token: ""
    from-number: ""
  meta:
    phone-number-id: ""
    access-token: ""

# Configuração futura IA (OpenAI)
ai:
  enabled: ${AI_ENABLED:false}
  provider: ${AI_PROVIDER:openai}
  openai:
    api-key: ${AI_OPENAI_API_KEY:}
    model: ${AI_OPENAI_MODEL:gpt-4o-mini}
    base-url: ${AI_OPENAI_BASE_URL:https://api.openai.com/v1/chat/completions}

# Configuração Mercado Pago (Checkout Pro)
mercadopago:
  access-token: ${MERCADOPAGO_ACCESS_TOKEN}
  public-key: ${MERCADOPAGO_PUBLIC_KEY}
  back-urls:
    success: ${MERCADOPAGO_SUCCESS_URL:}
    pending: ${MERCADOPAGO_PENDING_URL:}
    failure: ${MERCADOPAGO_FAILURE_URL:}
  notification-url: ${MERCADOPAGO_NOTIFICATION_URL:}
  webhook-secret: ${MERCADOPAGO_WEBHOOK_SECRET:}

logging:
  level:
    com.osmech.payment.service: DEBUG

