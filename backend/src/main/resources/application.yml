server:
  port: 8080

spring:
  application:
    name: osmech-backend
  
  datasource:
    url: jdbc:postgresql://localhost:5432/oficina_db
    username: postgres
    password: 3782
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  sql:
    init:
      mode: always

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:osmech-super-secret-key-change-in-production-2026}
  expiration: 86400000 # 24 horas em millisegundos

# CORS Configuration
cors:
  allowed-origins: http://localhost:*,http://127.0.0.1:*

# Logging
logging:
  level:
    com.osmech: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
